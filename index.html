<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Android Device Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a;--panel:#0f1628;--border:#1e2d4a;
    --accent:#00d4ff;--accent2:#7b2fff;--text:#c8daf0;
    --dim:#4a6080;--green:#00ff88;
    --mono:'Share Tech Mono',monospace;--head:'Exo 2',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);font-family:var(--mono);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:30px 16px;
    background-image:
      radial-gradient(ellipse at 20% 0%,rgba(0,212,255,.06) 0%,transparent 60%),
      radial-gradient(ellipse at 80% 100%,rgba(123,47,255,.06) 0%,transparent 60%);
  }
  header{text-align:center;margin-bottom:28px;}
  header h1{
    font-family:var(--head);font-weight:800;
    font-size:clamp(1.4rem,4vw,2rem);letter-spacing:.12em;text-transform:uppercase;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  header p{font-size:.7rem;color:var(--dim);letter-spacing:.2em;margin-top:5px;text-transform:uppercase;}

  .controls{
    display:flex;gap:10px;margin-bottom:8px;
    flex-wrap:wrap;justify-content:center;width:100%;max-width:700px;
  }
  .bwrap{position:relative;flex:1;min-width:180px;}
  .bwrap input{
    width:100%;background:var(--panel);border:1px solid var(--border);
    color:var(--text);font-family:var(--mono);font-size:.82rem;
    padding:10px 14px;border-radius:6px;outline:none;transition:border-color .2s;
  }
  .bwrap input:focus{border-color:var(--accent);}
  .bwrap input::placeholder{color:var(--dim);}
  .sugs{
    position:absolute;top:calc(100% + 4px);left:0;right:0;
    background:#111c30;border:1px solid var(--border);
    border-radius:6px;z-index:100;display:none;overflow:hidden;
  }
  .sugs.show{display:block;}
  .sug{padding:8px 14px;font-size:.78rem;cursor:pointer;color:var(--text);transition:background .15s;}
  .sug:hover,.sug.on{background:rgba(0,212,255,.1);color:var(--accent);}

  select{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    font-family:var(--mono);font-size:.78rem;padding:10px 14px;
    border-radius:6px;outline:none;cursor:pointer;
  }
  select:focus{border-color:var(--accent);}
  .btn{
    font-family:var(--head);font-weight:600;font-size:.82rem;
    letter-spacing:.1em;text-transform:uppercase;
    padding:10px 22px;border-radius:6px;border:none;cursor:pointer;transition:all .18s;
  }
  .bp{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
  .bp:hover{opacity:.85;transform:translateY(-1px);}
  .bs{background:transparent;border:1px solid var(--border);color:var(--dim);}
  .bs:hover{border-color:var(--accent);color:var(--accent);}

  .hint{font-size:.65rem;color:var(--dim);text-align:center;margin-bottom:20px;letter-spacing:.08em;}
  .hint span{color:var(--accent);}
  .ctr{font-size:.68rem;color:var(--dim);text-align:center;margin-bottom:20px;letter-spacing:.1em;}
  .ctr b{color:var(--accent);font-weight:normal;}

  .cards{width:100%;max-width:780px;display:flex;flex-direction:column;gap:14px;}
  .card{
    background:var(--panel);border:1px solid var(--border);
    border-radius:10px;overflow:hidden;animation:fi .28s ease;position:relative;
  }
  @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .ch{
    display:flex;align-items:center;justify-content:space-between;
    padding:11px 16px;border-bottom:1px solid var(--border);background:rgba(0,212,255,.04);
  }
  .cnum{font-family:var(--head);font-size:.75rem;color:var(--dim);font-weight:600;letter-spacing:.05em;min-width:28px;}
  .ct{font-family:var(--head);font-weight:700;font-size:.95rem;color:#fff;}
  .cbadge{
    font-size:.62rem;padding:3px 9px;border-radius:20px;
    font-family:var(--head);font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  }

  table{width:100%;border-collapse:collapse;}
  table tr{border-bottom:1px solid rgba(30,45,74,.45);}
  table tr:last-child{border-bottom:none;}
  table td{padding:6px 16px;vertical-align:middle;}
  td.k{font-size:.62rem;color:#ff5555;text-transform:uppercase;letter-spacing:.09em;white-space:nowrap;width:130px;}
  td.v{font-size:.76rem;color:var(--text);word-break:break-all;}
  td.v.hi{color:var(--accent);}
  td.v.fp{color:#7a90b8;font-size:.67rem;}
  td.ac{width:54px;text-align:right;padding-left:4px;}

  .cp{
    background:transparent;border:1px solid #00aa55;color:#00cc66;
    font-family:var(--mono);font-size:.75rem;padding:6px 12px;
    border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .cp:hover{border-color:var(--green);color:var(--green);}
  .cp.ok{border-color:var(--green);color:var(--green);}

  .cf{
    display:flex;gap:8px;padding:9px 16px;
    border-top:1px solid var(--border);justify-content:flex-end;
  }
  .empty{
    text-align:center;padding:60px 20px;color:var(--dim);
    font-size:.82rem;letter-spacing:.1em;
  }
  .empty svg{margin:0 auto 14px;display:block;opacity:.25;}

  .toast{
    position:fixed;bottom:22px;right:22px;
    background:var(--green);color:#000;
    font-family:var(--head);font-weight:700;font-size:.78rem;
    padding:9px 16px;border-radius:6px;
    opacity:0;transform:translateY(8px);transition:all .22s;
    pointer-events:none;letter-spacing:.08em;
  }
  .toast.show{opacity:1;transform:translateY(0);}
  .sl{
    position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
    animation:sc 1.2s ease forwards;pointer-events:none;
  }
  @keyframes sc{0%{top:0;opacity:1}100%{top:100%;opacity:0}}
</style>
</head>

</header>

<div class="controls">
  <div class="bwrap">
    <input id="bInput" type="text" placeholder="Type brand: Redmi, Samsung, Pixel …"
      autocomplete="off" oninput="onType()" onkeydown="onKey(event)"/>
    <div class="sugs" id="sugs"></div>
  </div>
  <select id="cnt">
    <option value="1">1 Device</option>
    <option value="3" selected>3 Devices</option>
    <option value="5">5 Devices</option>
    <option value="10">10 Devices</option>
  </select>
  <button class="btn bp" onclick="gen()">⚡ Generate</button>
  <button class="btn bs" onclick="clr()">✕ Clear</button>
</div>

<div class="hint" id="hint">Brand: <span>All</span> · Leave blank for all brands</div>
<div class="ctr" id="ctr">Generated: <b>0</b> devices this session</div>

<div class="cards" id="grid">

    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">

      <line x1="12" y1="18" x2="12.01" y2="18"/>
    </svg>
    Type a brand name (or leave blank) then press Generate
  </div>
</div>
<div class="toast" id="toast"></div>

// unique generation — persistent via localStorage (survives reload/reopen)
function loadSet(key){
  try{return new Set(JSON.parse(localStorage.getItem(key)||"[]"));}catch(e){return new Set();}
}
function saveSet(key,set){
  try{localStorage.setItem(key,JSON.stringify([...set]));}catch(e){}
}
const usedD=loadSet("adg_displays");
const usedFP=loadSet("adg_fps");

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
const CH="ABCDEFGHJKLMNPQRSTUVWXYZ0123456789";
function ra(n){return Array.from({length:n},()=>CH[ri(0,CH.length-1)]).join("");}

function uniqueDisplay(){
  let id,t=0;
  do{
    const p=PFXS[ri(0,PFXS.length-1)];
    const yy=ri(21,24),mm=String(ri(1,12)).padStart(2,"0"),dd=String(ri(1,28)).padStart(2,"0");
    id=p+"."+yy+mm+"."+dd+"."+ra(6);
    t++;
  }while(usedD.has(id)&&t<500);
  usedD.add(id);saveSet("adg_displays",usedD);return id;
}

function uniqueFP(d,did){
  const ver=AV[did.split(".")[0]]||"13";
  let fp,t=0;
  do{
    const keys=["release-keys","dev-keys","test-keys"][ri(0,2)];
    fp=d.mfr+"/"+d.model+"/"+d.dev.toLowerCase()+":"+ver+"/"+did+"/"+ra(7)+":user/"+keys;
    t++;
  }while(usedFP.has(fp)&&t<500);
  usedFP.add(fp);saveSet("adg_fps",usedFP);return fp;
}

// suggestions
let sIdx=-1;
function onType(){
  const q=document.getElementById("bInput").value.trim().toLowerCase();
  const box=document.getElementById("sugs");sIdx=-1;
  if(!q){box.classList.remove("show");setHint("All");return;}
  const m=BRANDS.filter(b=>b.toLowerCase().startsWith(q));
  if(!m.length){box.classList.remove("show");return;}
  box.innerHTML=m.map(b=>'<div class="sug" data-v="'+b+'" onmousedown="pick(\''+b+'\')">'+b+'</div>').join("");
  box.classList.add("show");
}
function onKey(e){
  const box=document.getElementById("sugs");
  const items=box.querySelectorAll(".sug");
  if(e.key==="ArrowDown"){sIdx=Math.min(sIdx+1,items.length-1);hilite(items);e.preventDefault();}
  else if(e.key==="ArrowUp"){sIdx=Math.max(sIdx-1,0);hilite(items);e.preventDefault();}
  else if(e.key==="Enter"){
    if(sIdx>=0&&items[sIdx])pick(items[sIdx].dataset.v);
    else{box.classList.remove("show");gen();}
  }
  else if(e.key==="Escape")box.classList.remove("show");
}
function hilite(items){items.forEach((el,i)=>el.classList.toggle("on",i===sIdx));}
function pick(v){
  document.getElementById("bInput").value=v;
  document.getElementById("sugs").classList.remove("show");
  setHint(v);
}
function setHint(v){
  document.getElementById("hint").innerHTML='Brand: <span>'+(v||"All")+'</span> · Leave blank for all brands';
}
document.addEventListener("click",e=>{
  if(!e.target.closest(".bwrap"))document.getElementById("sugs").classList.remove("show");
});

// Safe copy — Android Chrome compatible
function safeCopy(text,btn,label){
  const ta=document.createElement("textarea");
  ta.value=text;
  ta.setAttribute("readonly","");
  ta.style.cssText="position:fixed;top:0;left:0;width:100px;height:40px;opacity:0.001;z-index:99999;font-size:16px;border:none;";
  document.body.appendChild(ta);
  ta.focus();
  ta.setSelectionRange(0,99999);
  let ok=false;
  try{ok=document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta);

  function done(){
    const orig=btn.textContent;
    btn.textContent="✓"+(label?" "+label:"");btn.classList.add("ok");
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove("ok");},1400);
    showToast("Copied!");
  }

  if(ok){
    done();
  }else if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(done).catch(done);
  }else{
    done();
  }
}

document.addEventListener("click",function(e){
  const btn=e.target.closest(".cp[data-val]");
  if(!btn||btn.classList.contains("cp-all"))return;
  safeCopy(btn.dataset.val,btn,"");
});
document.addEventListener("click",function(e){
  const btn=e.target.closest(".cp-all");
  if(!btn)return;
  safeCopy(btn.closest(".card").dataset.all,btn,"Copied");
});

let total=0;
function getPool(q){
  if(!q.trim())return DB;
  const lq=q.trim().toLowerCase();
  return DB.filter(d=>
    d.brand.toLowerCase().includes(lq)||
    d.name.toLowerCase().includes(lq)||
    d.mfr.toLowerCase().includes(lq)
  );
}

function gen(){
  const bv=document.getElementById("bInput").value;
  const count=parseInt(document.getElementById("cnt").value);
  const grid=document.getElementById("grid");
  document.getElementById("sugs").classList.remove("show");
  setHint(bv||"All");
  const pool=getPool(bv);
  if(!pool.length){showToast("No devices found: "+bv);return;}
  const emp=grid.querySelector(".empty");
  if(emp)emp.remove();

  for(let i=0;i<count;i++){
    const d=pool[ri(0,pool.length-1)];
    const did=uniqueDisplay();
    const fp=uniqueFP(d,did);
    const hw=HW[d.cpu]||d.board;
    const col=bc(d.brand);

    const F=[
      ["Board",           d.board,  ""],
      ["Brand",           d.brand,  "hi"],
      ["CPU Manufacturer",d.cpuMfr, ""],
      ["CPU Model",       d.cpu,    "hi"],
      ["Device",          d.dev,    ""],
      ["Display ID",      did,      "hi"],
      ["Fingerprint",     fp,       "fp"],
      ["Hardware",        hw,       ""],
      ["Manufacturer",    d.mfr,    ""],
      ["Model",           d.model,  "hi"],
      ["Name",            d.name,   ""],
    ];

    // Build rows safely - use data-val attribute, escaped for HTML
    let rows="";
    for(const [k,v,c] of F){
      const safeV=v.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      rows+="<tr><td class='k'>"+k+"</td><td class='v "+c+"'>"+v+"</td><td class='ac'><button class='cp' data-val=\""+safeV+"\">copy</button></td></tr>";
    }

    const allText=F.map(([k,v])=>k+": "+v).join("\n");
    const safeAll=allText.replace(/&/g,"&amp;").replace(/"/g,"&quot;");

    const card=document.createElement("div");
    card.className="card";
    card.dataset.all=allText;
    card.innerHTML=
      '<div class="sl"></div>'+
      '<div class="ch">'+
        '<div style="display:flex;align-items:center;gap:10px;">'+
          '<span class="cnum">#'+(total+i+1)+'</span>'+
          '<div class="ct">'+d.name+'</div>'+
        '</div>'+
        '<span class="cbadge" style="background:'+col+'22;color:'+col+';border:1px solid '+col+'44;">'+d.brand+'</span>'+
      '</div>'+
      '<table>'+rows+'</table>'+
      '<div class="cf"><button class="cp cp-all" style="font-size:.7rem;padding:5px 13px;">Copy All</button></div>';

    grid.prepend(card);
    total++;
  }
  document.getElementById("ctr").innerHTML="Generated: <b>"+total+"</b> devices this session";
}

function clr(){
  document.getElementById("grid").innerHTML=
    '<div class="empty"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">'+
    '<rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>'+
    'Type a brand name (or leave blank) then press Generate</div>';
  usedD.clear();usedFP.clear();
  saveSet("adg_displays",usedD);saveSet("adg_fps",usedFP);
  total=0;
  document.getElementById("ctr").innerHTML="Generated: <b>0</b> devices this session";
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);
}
</script>
